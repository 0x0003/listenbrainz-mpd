[package]
name = "listenbrainz-mpd"
version = "2.0.1"
edition = "2021"
description = "ListenBrainz submission client for MPD"
license = "AGPL-3.0-only"
keywords = ["mpd", "listenbrainz", "musicbrainz", "scrobbling", "scrobbler"]
categories = ["command-line-utilities", "multimedia::audio"]
repository = "https://codeberg.org/elomatreb/listenbrainz-mpd"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.68"
dirs = "4.0.0"
mpd_client = "1.0.0"
reqwest = { version = "0.11.14", features = ["json"] }
serde = { version = "1.0.152", features = ["derive"] }
serde_json = "1.0.91"
tokio = { version = "1.25.0", features = ["rt", "net", "time", "macros", "sync"] }
tokio-stream = "0.1.11"
toml = "0.7.1"
tracing = "0.1.37"
tracing-subscriber = { version = "0.3.16", features = ["env-filter"] }
clap = { version = "4.1.4", features = ["cargo", "derive"] }
