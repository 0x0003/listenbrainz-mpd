[package]
name = "listenbrainz-mpd"
version = "2.0.2"
edition = "2021"
description = "ListenBrainz submission client for MPD"
license = "AGPL-3.0-only"
keywords = ["mpd", "listenbrainz", "musicbrainz", "scrobbling", "scrobbler"]
categories = ["command-line-utilities", "multimedia::audio"]
repository = "https://codeberg.org/elomatreb/listenbrainz-mpd"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.69"
dirs = "4.0.0"
mpd_client = "1.0.0"
reqwest = { version = "0.11.14", features = ["json"] }
serde = { version = "1.0.154", features = ["derive"] }
serde_json =  { version = "1.0.94", features = ["raw_value"] }
tokio = { version = "1.26.0", features = ["rt", "net", "time", "macros", "sync"] }
tokio-stream = "0.1.12"
toml = "0.7.2"
tracing = "0.1.37"
tracing-subscriber = { version = "0.3.16", features = ["env-filter"] }
clap = { version = "4.1.8", features = ["cargo", "derive"] }
once_cell = "1.17.1"
rusqlite = "0.28.0"
